<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
          crossorigin="anonymous">
    <title>Smiles Jobs</title>
</head>

<body>
<div class="container">
    <h1>Smiles Jobs!</h1>
</div>

<div class="container">
    <div class="row mt-3">
        <div class="col-md-4">
            <a th:href="@{/}" class="btn btn-info" role="button">Go back to the main page</a>
        </div>
    </div>
    <br>
    <h2>Are you looking for a job??</h2>
    <p>The best place to find a job is the SmilesJobs!</p>
    <p>Please take a look at job advertisement </p>

    <form action="/candidate" method="post" th:object="${candidateDTO}">
        <h2>Add New Candidate</h2>

        <div class="form-group">
            <label for="candidateName">Candidate Name:</label>
            <input type="text" id="candidateName" name="candidateName" th:field="*{candidateName}" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-primary">Add</button>
    </form>


</div>
</body>


</html>
