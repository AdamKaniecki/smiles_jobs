server:
  port: 8150
#  servlet:
#    context-path: /smiles-jobs

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/smiles_jobs
    username: postgres
    password: postgres
    hikari:
      idle-timeout: 10000
      connectionTimeout: 200000
      minimumIdle: 10
      maximumPoolSize: 20

  jpa:
    hibernate:
      ddl-auto: none
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

  mvc:
    hiddenmethod:
      filter:
        enabled: true

